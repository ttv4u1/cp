<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Compressor Pro v1.1.0</title>
    <!-- COI Service Worker untuk memperbaiki masalah SharedArrayBuffer di GitHub Pages -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .version {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 10px;
            display: block;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #0f172a; }
        p { font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; }

        .upload-area {
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: border 0.3s;
        }

        .upload-area:hover { border-color: var(--primary); }

        input[type="file"] { width: 100%; font-size: 0.9rem; }

        .settings {
            text-align: left;
            margin-bottom: 20px;
            display: none;
        }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            outline: none;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .progress-box {
            margin-top: 20px;
            display: none;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        #progressBar {
            background: var(--primary);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .perc-text { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        #outputArea {
            margin-top: 25px;
            display: none;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #000;
        }

        .download-btn {
            background-color: var(--success);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Compressor</h1>
    <p>Kompres & Konversi Video Tanpa Kehilangan Kualitas</p>

    <div class="upload-area">
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div id="settings" class="settings">
        <label for="formatSelect">Format Output:</label>
        <select id="formatSelect">
            <option value="mp4">MP4 (Paling Populer)</option>
            <option value="mkv">MKV (Kualitas Tinggi)</option>
            <option value="mov">MOV (Apple)</option>
            <option value="webm">WebM (Optimal Web)</option>
            <option value="avi">AVI (Lama)</option>
        </select>
    </div>

    <button id="startBtn" disabled>
        <span>Mulai Proses</span>
    </button>

    <div id="progressBox" class="progress-box">
        <div class="progress-bar-bg">
            <div id="progressBar"></div>
        </div>
        <div id="status">Memproses: <span class="perc-text" id="percNum">0%</span></div>
    </div>

    <div id="outputArea">
        <video id="preview" controls></video>
        <a id="downloadLink" class="download-btn">
            Download Video Hasil
        </a>
    </div>

    <span class="version">v1.1.0 - Powered by FFmpeg.wasm</span>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: false, // Set true untuk debugging
        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const fileInput = document.getElementById('fileInput');
    const startBtn = document.getElementById('startBtn');
    const settings = document.getElementById('settings');
    const progressBox = document.getElementById('progressBox');
    const progressBar = document.getElementById('progressBar');
    const percNum = document.getElementById('percNum');
    const outputArea = document.getElementById('outputArea');
    const preview = document.getElementById('preview');
    const downloadLink = document.getElementById('downloadLink');
    const formatSelect = document.getElementById('formatSelect');

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            startBtn.disabled = false;
            settings.style.display = 'block';
        }
    });

    startBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        const outExt = formatSelect.value;
        const outName = `output.${outExt}`;

        // UI Reset
        startBtn.disabled = true;
        outputArea.style.display = 'none';
        progressBox.style.display = 'block';
        
        if (!ffmpeg.isLoaded()) {
            percNum.innerText = "Loading Engine...";
            await ffmpeg.load();
        }

        // Progress Handler
        ffmpeg.setProgress(({ ratio }) => {
            const percentage = Math.round(ratio * 100);
            progressBar.style.width = percentage + '%';
            percNum.innerText = percentage + '%';
        });

        // Write file to Virtual FS
        ffmpeg.FS('writeFile', 'input', await fetchFile(file));

        /* 
           COMMAND EXPLANATION:
           -crf 23: Balance between size & quality (Lower is better quality, 18-28 is sweet spot)
           -preset faster: Speed of compression
           -vcodec libx264: Industry standard video codec
        */
        await ffmpeg.run(
            '-i', 'input',
            '-vcodec', 'libx264',
            '-crf', '23',
            '-preset', 'faster',
            outName
        );

        // Read Result
        const data = ffmpeg.FS('readFile', outName);
        const url = URL.createObjectURL(new Blob([data.buffer], { type: `video/${outExt}` }));

        // Show Result
        progressBox.style.display = 'none';
        outputArea.style.display = 'block';
        preview.src = url;
        downloadLink.href = url;
        downloadLink.download = `compressed_video.${outExt}`;
        
        startBtn.disabled = false;
    });
</script>

</body>
</html>

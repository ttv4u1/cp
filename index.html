<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Compressor Pro v1.2.1</title>
    
    <!-- LOAD SERVICE WORKER PERTAMA KALI -->
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --p: #6366f1; --p-h: #4f46e5; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; }
        .alert { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 0.85rem; }
        .drop-zone { border: 2px dashed #e2e8f0; padding: 2rem; border-radius: 1rem; margin-bottom: 1.5rem; cursor: pointer; }
        .drop-zone:hover { border-color: var(--p); background: #f1f5f9; }
        select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 5px; font-size: 1rem; }
        button { background: var(--p); color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 1.5rem; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .prog-container { margin-top: 1.5rem; display: none; }
        .bar { background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; }
        #fill { background: var(--p); width: 0%; height: 100%; transition: 0.3s; }
        #output { margin-top: 2rem; display: none; border-top: 2px solid #f1f5f9; padding-top: 1.5rem; }
        video { width: 100%; border-radius: 1rem; margin-bottom: 1rem; }
        .dl-btn { background: #10b981; display: block; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .v { font-size: 0.7rem; color: #94a3b8; margin-top: 1.5rem; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>Video Compressor</h2>
    <p style="color: #64748b; margin-bottom: 1rem;">v1.2.1 - Fix SharedArrayBuffer</p>

    <!-- Pesan Error jika SharedArrayBuffer mati -->
    <div id="sabError" class="alert">
        Browser memblokir fitur kompresi. Sedang mencoba memperbaiki... Jika pesan ini tidak hilang, silakan Refresh (F5).
    </div>

    <div class="drop-zone" onclick="document.getElementById('f').click()">
        <span id="fN">Pilih atau Drag Video ke Sini</span>
        <input type="file" id="f" accept="video/*" hidden>
    </div>

    <div style="text-align: left;">
        <label style="font-size: 0.8rem; font-weight: bold;">Format Tujuan</label>
        <select id="fmt">
            <option value="mp4">MP4 (Sangat Disarankan)</option>
            <option value="mkv">MKV</option>
            <option value="webm">WebM</option>
        </select>
    </div>

    <button id="btn" disabled>Kompres Sekarang</button>

    <div class="prog-container" id="pC">
        <div class="bar"><div id="fill"></div></div>
        <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.9rem;">
            <span id="stat">Memproses...</span>
            <span id="perc">0%</span>
        </div>
    </div>

    <div id="output">
        <video id="pre" controls></video>
        <a id="dl" class="dl-btn">Download Video</a>
    </div>

    <span class="v">Proses dilakukan 100% di perangkat Anda.</span>
</div>

<script>
    // Cek apakah SharedArrayBuffer tersedia
    if (!window.SharedArrayBuffer) {
        document.getElementById('sabError').style.display = 'block';
    }

    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: true, 
        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' 
    });

    const fileIn = document.getElementById('f');
    const btn = document.getElementById('btn');
    
    fileIn.onchange = () => {
        if(fileIn.files[0]) {
            document.getElementById('fN').innerText = fileIn.files[0].name;
            btn.disabled = false;
        }
    };

    btn.onclick = async () => {
        const file = fileIn.files[0];
        const ext = document.getElementById('fmt').value;
        btn.disabled = true;
        document.getElementById('pC').style.display = 'block';
        document.getElementById('output').style.display = 'none';

        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            ffmpeg.FS('writeFile', 'in', await fetchFile(file));

            ffmpeg.setProgress(({ ratio }) => {
                const p = Math.round(ratio * 100);
                document.getElementById('fill').style.width = p + '%';
                document.getElementById('perc').innerText = p + '%';
            });

            // Jalankan FFmpeg
            // -crf 23 (Kualitas visual tetap terjaga, ukuran turun drastis)
            await ffmpeg.run('-i', 'in', '-c:v', 'libx264', '-crf', '23', '-preset', 'faster', '-c:a', 'aac', `out.${ext}`);

            const data = ffmpeg.FS('readFile', `out.${ext}`);
            const url = URL.createObjectURL(new Blob([data.buffer], { type: `video/${ext}` }));

            document.getElementById('pre').src = url;
            document.getElementById('dl').href = url;
            document.getElementById('dl').download = `compressed_${Date.now()}.${ext}`;
            document.getElementById('output').style.display = 'block';
            document.getElementById('pC').style.display = 'none';

        } catch (e) {
            alert("Gagal: " + e.message);
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
